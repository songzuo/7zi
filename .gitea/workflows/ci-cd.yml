# Gitea Actions CI/CD Pipeline for 7zi
# 迁移自 GitHub Actions - Gitea Actions 兼容版本

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# 并发控制
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ============================================
  # Job 1: 代码质量检查
  # ============================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  # ============================================
  # Job 2: 类型检查
  # ============================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: TypeScript check
        run: npm run type-check

  # ============================================
  # Job 3: 单元测试（并行矩阵）
  # ============================================
  test:
    name: Test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run tests (shard ${{ matrix.shard }}/4)
        run: npm run test:run -- --shard=${{ matrix.shard }}/4 --reporter=github-actions

      - name: Upload coverage
        if: matrix.shard == 1
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ============================================
  # Job 4: 构建
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # 缓存 Next.js 构建
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production

      - name: Analyze bundle size
        run: |
          echo "📊 Bundle Size Analysis"
          echo "---"
          du -sh .next/
          du -sh .next/static/
          du -sh .next/server/
          echo "---"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 1

  # ============================================
  # Job 5: Docker 构建
  # ============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Docker 层缓存
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-${{ hashFiles('Dockerfile', '**/package-lock.json') }}
          restore-keys: |
            docker-${{ runner.os }}-

      # 登录到 Gitea 容器注册表
      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GITEA_REGISTRY }}
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.GITEA_REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            NEXT_TELEMETRY_DISABLED=1

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ============================================
  # Job 6: 部署预检查
  # ============================================
  pre-deploy:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .

      - name: Verify build integrity
        run: |
          echo "🔍 Running pre-deployment checks..."

          test -d .next/standalone || { echo "❌ Missing standalone build"; exit 1; }
          test -d .next/static || { echo "❌ Missing static files"; exit 1; }
          test -d public || { echo "❌ Missing public directory"; exit 1; }

          BUILD_SIZE=$(du -sm .next/standalone | cut -f1)
          echo "📦 Build size: ${BUILD_SIZE}MB"

          if [ "$BUILD_SIZE" -gt 500 ]; then
            echo "⚠️ Warning: Build size exceeds 500MB, consider optimization"
          fi

          echo "✅ All pre-deployment checks passed!"

      - name: Generate deployment manifest
        run: |
          cat > deployment-manifest.json << EOF
          {
            "version": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "actor": "${{ github.actor }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "build_size_mb": "$(du -sm .next/standalone | cut -f1)"
          }
          EOF

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest
          path: deployment-manifest.json
          retention-days: 30

  # ============================================
  # Job 7: 部署到服务器
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [docker, pre-deploy]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment manifest
        uses: actions/download-artifact@v4
        with:
          name: deployment-manifest

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            DEPLOY_PATH="/opt/7zi-frontend"
            REGISTRY="${{ secrets.GITEA_REGISTRY }}"
            IMAGE_TAG="${{ needs.docker.outputs.image_tag }}"

            echo "🚀 Starting deployment to 165.232.43.117..."

            cd $DEPLOY_PATH

            # 拉取最新镜像
            echo "📦 Pulling latest Docker image..."
            docker-compose -f docker-compose.prod.yml pull

            # 备份当前版本
            echo "💾 Creating backup..."
            BACKUP_DIR="/opt/backups/7zi-frontend-$(date +%Y%m%d-%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            docker-compose -f docker-compose.prod.yml cp 7zi-frontend:/app . "$BACKUP_DIR/" 2>/dev/null || true

            # 滚动更新
            echo "🔄 Rolling update..."
            docker-compose -f docker-compose.prod.yml up -d --no-deps 7zi-frontend

            # 等待健康检查
            echo "⏳ Waiting for health check..."
            sleep 15

            # 健康检查
            for i in {1..10}; do
              if docker exec 7zi-frontend wget --no-verbose --tries=1 --spider http://localhost:3000/ 2>/dev/null; then
                echo "✅ Deployment successful!"
                exit 0
              fi
              echo "Attempt $i failed, retrying..."
              sleep 5
            done

            echo "❌ Health check failed!"
            docker-compose -f docker-compose.prod.yml logs --tail=50
            exit 1

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          curl -sf https://7zi.com/ > /dev/null && echo "✅ Website accessible" || echo "⚠️ Website not accessible"

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          # 这里可以添加通知逻辑（邮件、Telegram等）
