name: Build Cache Optimization

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_CACHE_DIR: .turbo-cache
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-
      
      - name: Cache Next.js build
        uses: actions/cache@v4
        id: cache-next-build
        with:
          path: |
            .next/cache
            .turbo-cache
          key: next-build-${{ github.sha }}
          restore-keys: |
            next-build-
      
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      
      - name: Build with cache
        run: |
          mkdir -p $TURBO_CACHE_DIR
          npm run build
      
      - name: Analyze build size
        run: node scripts/build-stats.js
      
      - name: Upload build report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-report.json
          retention-days: 7

  build-docker:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t 7zi-team:${{ github.sha }} .
      
      - name: Check image size
        run: |
          docker images 7zi-team:${{ github.sha }} --format "{{.Size}}"
