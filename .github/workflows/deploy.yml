# ============================================
# 7zi-frontend 自动部署到私有服务器
# 使用 SSH 部署到 7zi.com
# ============================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '22'

jobs:
  # ============================================
  # 构建和测试
  # ============================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:run

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 1

  # ============================================
  # 部署到生产服务器
  # ============================================
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://7zi.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Create deployment package
        run: |
          tar -czf deploy-package.tar.gz \
            .next \
            public \
            Dockerfile \
            docker-compose.prod.yml \
            nginx \
            package.json

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PASS: ${{ secrets.DEPLOY_PASS }}
          DEPLOY_PATH: /opt/7zi-frontend
        run: |
          echo "🚀 开始部署..."
          
          # 上传部署包
          sshpass -p "$SSH_PASS" scp -o StrictHostKeyChecking=no \
            deploy-package.tar.gz \
            $SSH_USER@$SSH_HOST:/tmp/
          
          # 在服务器上执行部署
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'ENDSSH'
            set -e
            
            DEPLOY_PATH="/opt/7zi-frontend"
            
            echo "📦 解压部署包..."
            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH
            tar -xzf /tmp/deploy-package.tar.gz
            rm /tmp/deploy-package.tar.gz
            
            # 确保环境配置存在
            if [ ! -f .env.production ]; then
              echo "⚠️ .env.production 不存在，创建默认配置"
              cat > .env.production << 'EOF'
          NODE_ENV=production
          PORT=3000
          HOSTNAME=0.0.0.0
          EOF
            fi
            
            echo "🐳 构建 Docker 镜像..."
            docker-compose -f docker-compose.prod.yml build --no-cache
            
            echo "🔄 重启服务..."
            docker-compose -f docker-compose.prod.yml down || true
            docker-compose -f docker-compose.prod.yml up -d
            
            echo "⏳ 等待服务启动..."
            sleep 15
            
            # 健康检查
            for i in {1..10}; do
              if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
                echo "✅ 部署成功！"
                exit 0
              fi
              echo "健康检查 $i/10 失败，等待重试..."
              sleep 5
            done
            
            echo "❌ 健康检查失败！"
            docker-compose -f docker-compose.prod.yml logs --tail=50
            exit 1
          ENDSSH
          
          echo "🎉 部署完成！"

      - name: Verify deployment
        run: |
          echo "验证部署状态..."
          curl -sf https://7zi.com/ > /dev/null && echo "✅ 网站可访问" || echo "⚠️ 无法访问"

      - name: Cleanup
        if: always()
        run: rm -f deploy-package.tar.gz

  # ============================================
  # 部署失败通知
  # ============================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "❌ 部署失败！"
          echo "请检查 GitHub Actions 日志获取详细信息"
          # 可以在这里添加通知逻辑（邮件、Slack、Telegram等）