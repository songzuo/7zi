# ============================================
# Grafana Dashboard Provisioning
# Auto-load dashboards from directory
# ============================================

apiVersion: 1

providers:
  - name: '7zi-frontend'
    orgId: 1
    folder: '7zi Monitoring'
    folderUid: '7zi-monitoring'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
